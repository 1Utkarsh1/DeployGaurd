openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: DeployGuard API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: scans
    description: URL scan operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /scan:
    post:
      operationId: createScan
      tags: [scans]
      summary: Scan a URL for launch readiness
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScanRequest"
      responses:
        "200":
          description: Scan result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanResult"
        "400":
          description: Invalid URL or SSRF blocked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit or concurrency limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Scan failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /scans:
    get:
      operationId: listScans
      tags: [scans]
      summary: List recent scans
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of recent scans
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanListResponse"

  /scans/{id}:
    get:
      operationId: getScan
      tags: [scans]
      summary: Get full scan data by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Full scan data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanResult"
        "404":
          description: Scan not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteScan
      tags: [scans]
      summary: Delete a scan by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"
        "404":
          description: Scan not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /scans/stats:
    get:
      operationId: getScanStats
      tags: [scans]
      summary: Get aggregated scan statistics
      responses:
        "200":
          description: Scan statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ScanRequest:
      type: object
      properties:
        url:
          type: string
          description: URL to scan
      required:
        - url

    ScanIssue:
      type: object
      properties:
        category:
          type: string
        severity:
          type: string
          enum: [critical, warning, info, passed]
        message:
          type: string
        explanation:
          type: string
        suggestion:
          type: string
      required:
        - category
        - severity
        - message
        - explanation
        - suggestion

    CategoryScore:
      type: object
      properties:
        name:
          type: string
        score:
          type: number
        maxScore:
          type: number
        label:
          type: string
      required:
        - name
        - score
        - maxScore
        - label

    ScoreKiller:
      type: object
      description: One of the top score-reducing findings
      properties:
        category:
          type: string
        message:
          type: string
        pointsLost:
          type: number
      required:
        - category
        - message
        - pointsLost

    ScanResult:
      type: object
      properties:
        id:
          type: integer
        url:
          type: string
        finalUrl:
          type: string
        score:
          type: number
        grade:
          type: string
          enum: [Excellent, Good, "Needs Work", Risky]
        statusCode:
          type: integer
        redirectChain:
          type: array
          items:
            type: string
        usesHttps:
          type: boolean
        responseTimeMs:
          type: number
        title:
          type: string
          nullable: true
        metaDescription:
          type: string
          nullable: true
        hasViewport:
          type: boolean
        hasOpenGraph:
          type: boolean
        hasRobotsTxt:
          type: boolean
        hasSitemapXml:
          type: boolean
        securityHeaders:
          type: object
          additionalProperties:
            type: boolean
        cookieIssues:
          type: array
          items:
            type: string
        htmlSizeKb:
          type: number
        scriptTagCount:
          type: integer
        categoryScores:
          type: array
          items:
            $ref: "#/components/schemas/CategoryScore"
        issues:
          type: array
          items:
            $ref: "#/components/schemas/ScanIssue"
        fixPrompt:
          type: string
        htmlHash:
          type: string
          description: SHA-256 fingerprint (first 16 hex chars) of the fetched body
        responseHeadersSnapshot:
          type: object
          additionalProperties:
            type: string
          description: Subset of response headers actually received
        corsScore:
          type: number
          description: CORS posture score 0-10 (10 = no CORS headers or properly scoped)
        scoreKillers:
          type: array
          items:
            $ref: "#/components/schemas/ScoreKiller"
          description: Top 3 findings by points deducted
        canonicalUrl:
          type: string
          nullable: true
          description: Value of the canonical link element, if present
        hasStructuredData:
          type: boolean
          description: Whether JSON-LD structured data was detected
        hasNoindex:
          type: boolean
          description: Whether a meta robots noindex directive was found
        structuredDataScore:
          type: number
          description: Structured data correctness score 0-5
        thirdPartyScore:
          type: number
          description: Third-party governance score 0-10 (10 = no external scripts)
        thirdPartyDomains:
          type: array
          items:
            type: string
          description: List of unique third-party script domains detected
        aiOverlay:
          $ref: "#/components/schemas/AiOverlayResult"
          nullable: true
          description: AI overlay score (present when LOCAL_AI=true, null otherwise)
        enginesRan:
          type: array
          items:
            type: string
          description: Which analysis engines ran (e.g. structured-data, third-party, headless, local-ai)
        mlOverlay:
          $ref: "#/components/schemas/MlOverlayResult"
          description: Optional ML/rule-based grade adjustment (absent when not computed)
        createdAt:
          type: string
      required:
        - id
        - url
        - finalUrl
        - score
        - grade
        - statusCode
        - redirectChain
        - usesHttps
        - responseTimeMs
        - hasViewport
        - hasOpenGraph
        - hasRobotsTxt
        - hasSitemapXml
        - securityHeaders
        - cookieIssues
        - htmlSizeKb
        - scriptTagCount
        - categoryScores
        - issues
        - fixPrompt
        - htmlHash
        - responseHeadersSnapshot
        - scoreKillers
        - canonicalUrl
        - hasStructuredData
        - hasNoindex
        - corsScore
        - structuredDataScore
        - thirdPartyScore
        - thirdPartyDomains
        - enginesRan
        - createdAt

    ScanSummary:
      type: object
      properties:
        id:
          type: integer
        url:
          type: string
        score:
          type: number
        grade:
          type: string
        createdAt:
          type: string
      required:
        - id
        - url
        - score
        - grade
        - createdAt

    ScanListResponse:
      type: object
      properties:
        scans:
          type: array
          items:
            $ref: "#/components/schemas/ScanSummary"
        total:
          type: integer
      required:
        - scans
        - total

    ScanStats:
      type: object
      properties:
        totalScans:
          type: integer
        averageScore:
          type: number
        gradeCounts:
          type: object
          additionalProperties:
            type: integer
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/ScanSummary"
      required:
        - totalScans
        - averageScore
        - gradeCounts
        - recentActivity

    DeleteResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    AiOverlayResult:
      type: object
      description: AI overlay score (feature gated via LOCAL_AI=true)
      properties:
        aiScore:
          type: number
          description: AI-evaluated launch-readiness score 0-100
        confidence:
          type: number
          description: Model confidence 0-1
        rationale:
          type: string
          description: One-sentence explanation of the AI score
        riskLabel:
          type: string
          description: '"Low" | "Moderate" | "High" | "Critical"'
        engineUsed:
          type: string
          description: '"deterministic-rules" | "local-llm" | "none"'
      required:
        - aiScore
        - confidence
        - rationale
        - riskLabel
        - engineUsed

    MlOverlayResult:
      type: object
      description: Deterministic rule-based grade overlay (stub for future ML model)
      properties:
        adjustedGrade:
          type: string
          description: '"Excellent" | "Good" | "Needs Work" | "Risky"'
        confidence:
          type: number
          description: Model confidence 0-1
        rationale:
          type: string
          description: Human-readable explanation of the adjusted grade
        featureImportance:
          type: array
          items:
            type: object
            properties:
              feature:
                type: string
              contribution:
                type: number
            required:
              - feature
              - contribution
      required:
        - adjustedGrade
        - confidence
        - rationale
        - featureImportance

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
